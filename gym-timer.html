<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM TIMER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent-dim: #b8cc38;
    --text: #f0f0f0;
    --muted: #555555;
    --danger: #ff4747;
    --rest: #47b8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .phase-badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    transition: all 0.3s;
  }

  .phase-badge.work {
    background: rgba(232,255,71,0.12);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.3);
  }

  .phase-badge.rest {
    background: rgba(71,184,255,0.12);
    color: var(--rest);
    border: 1px solid rgba(71,184,255,0.3);
  }

  /* Timer ring */
  .timer-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
  }

  .ring-progress.rest-mode {
    stroke: var(--rest);
  }

  .timer-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-display {
    font-family: 'Bebas Neue', cursive;
    font-size: 88px;
    line-height: 1;
    letter-spacing: 2px;
    color: var(--text);
    transition: color 0.3s;
  }

  .time-display.warning {
    color: var(--danger);
    animation: pulse 0.5s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  .time-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  /* Sets counter */
  .sets-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .sets-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
    font-family: 'DM Sans', sans-serif;
  }

  .sets-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .sets-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .sets-display {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    line-height: 1;
    letter-spacing: 2px;
  }

  .sets-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .sets-dots {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.2s;
  }

  .dot.done {
    background: var(--accent);
  }

  /* Duration selector */
  .duration-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    text-align: center;
  }

  .duration-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 18px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0a;
    font-weight: 700;
  }

  /* Custom input */
  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .custom-input {
    width: 60px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 7px 10px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .custom-input:focus {
    border-color: var(--accent);
  }

  .custom-input::placeholder {
    color: var(--muted);
  }

  .custom-label {
    font-size: 12px;
    color: var(--muted);
  }

  /* Main controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-main {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #0a0a0a;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 0 28px rgba(232,255,71,0.2);
  }

  .btn-main:hover {
    transform: scale(1.06);
    box-shadow: 0 0 40px rgba(232,255,71,0.35);
  }

  .btn-main:active {
    transform: scale(0.96);
  }

  .btn-main.rest-mode {
    background: var(--rest);
    box-shadow: 0 0 28px rgba(71,184,255,0.2);
  }

  .btn-secondary {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-secondary:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Stats bar */
  .stats-bar {
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .stat-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 26px;
    letter-spacing: 1px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Flash overlay */
  .flash {
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.1s;
  }

  .flash.active {
    animation: flashAnim 0.6s ease-out forwards;
  }

  @keyframes flashAnim {
    0%   { opacity: 0.25; }
    100% { opacity: 0; }
  }

  /* Completed overlay */
  .complete-toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'Bebas Neue', cursive;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px 28px;
    border-radius: 30px;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  .complete-toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="complete-toast" id="toast">¡SERIE COMPLETADA!</div>

<div class="container">

  <div class="header">
    <div class="logo">WORKOUT</div>
    <div class="phase-badge work" id="phaseBadge">TRABAJO</div>
  </div>

  <!-- Timer ring -->
  <div class="timer-wrap">
    <svg class="ring-svg" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="118"/>
      <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="118"
        stroke-dasharray="741.4"
        stroke-dashoffset="0"/>
    </svg>
    <div class="timer-inner">
      <div class="time-display" id="timeDisplay">1:30</div>
      <div class="time-label" id="timeLabel">DESCANSO</div>
    </div>
  </div>

  <!-- Sets -->
  <div class="sets-row">
    <button class="sets-btn" id="setsDown">−</button>
    <div class="sets-info">
      <div class="sets-display" id="setsDisplay">0</div>
      <div class="sets-label">SERIES</div>
      <div class="sets-dots" id="setsDots"></div>
    </div>
    <button class="sets-btn" id="setsUp">+</button>
  </div>

  <!-- Duration -->
  <div class="duration-section">
    <div class="section-label">Tiempo de descanso</div>
    <div class="duration-pills" id="pills">
      <button class="pill" data-val="30">30s</button>
      <button class="pill active" data-val="90">1:30</button>
      <button class="pill" data-val="120">2:00</button>
      <button class="pill" data-val="180">3:00</button>
    </div>
    <div class="custom-row">
      <input class="custom-input" id="customInput" type="number" min="5" max="600" placeholder="seg"/>
      <span class="custom-label">segundos (manual)</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-secondary" id="btnReset" title="Reset">↺</button>
    <button class="btn-main" id="btnPlay">▶</button>
    <button class="btn-secondary" id="btnSet" title="Registrar serie">＋</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="statSets">0</div>
      <div class="stat-label">Series</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statRests">0</div>
      <div class="stat-label">Descansos</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statTime">0m</div>
      <div class="stat-label">En gym</div>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let restDuration = 90;       // seconds
let remaining    = 90;
let totalDuration = 90;
let running      = false;
let interval     = null;
let phase        = 'idle';   // idle | rest
let sets         = 0;
let totalRests   = 0;
let sessionStart = null;

// Ring params
const CIRCUMFERENCE = 2 * Math.PI * 118; // 741.4

// ─── Elements ────────────────────────────────────────────────────────────────
const timeDisplay  = document.getElementById('timeDisplay');
const timeLabel    = document.getElementById('timeLabel');
const ringProgress = document.getElementById('ringProgress');
const phaseBadge   = document.getElementById('phaseBadge');
const setsDisplay  = document.getElementById('setsDisplay');
const setsDots     = document.getElementById('setsDots');
const statSets     = document.getElementById('statSets');
const statRests    = document.getElementById('statRests');
const statTime     = document.getElementById('statTime');
const btnPlay      = document.getElementById('btnPlay');
const btnReset     = document.getElementById('btnReset');
const btnSet       = document.getElementById('btnSet');
const pills        = document.querySelectorAll('.pill');
const customInput  = document.getElementById('customInput');
const flash        = document.getElementById('flash');
const toast        = document.getElementById('toast');
const setsDown     = document.getElementById('setsDown');
const setsUp       = document.getElementById('setsUp');

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : `${sec}`;
}

function setRing(ratio) {
  const offset = CIRCUMFERENCE * (1 - ratio);
  ringProgress.style.strokeDashoffset = offset;
}

function updateDisplay() {
  timeDisplay.textContent = fmtTime(remaining);
  // warning below 6s
  if (remaining <= 5 && running) {
    timeDisplay.classList.add('warning');
  } else {
    timeDisplay.classList.remove('warning');
  }
}

function flashScreen() {
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function beep(type = 'end') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'end') {
      // Three short beeps
      [0, 0.18, 0.36].forEach((delay, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.15);
      });
    } else {
      // Single tick for set register
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1100;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    }
  } catch(e) {}
}

function updateDots() {
  setsDots.innerHTML = '';
  const max = Math.min(sets, 8);
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'dot done';
    setsDots.appendChild(d);
  }
}

function updateSessionTime() {
  if (!sessionStart) { statTime.textContent = '0m'; return; }
  const mins = Math.floor((Date.now() - sessionStart) / 60000);
  statTime.textContent = mins + 'm';
}

// ─── Timer logic ─────────────────────────────────────────────────────────────
function startRest() {
  phase = 'rest';
  remaining = restDuration;
  totalDuration = restDuration;
  running = true;
  phaseBadge.textContent = 'DESCANSO';
  phaseBadge.className = 'phase-badge rest';
  timeLabel.textContent = 'DESCANSO';
  btnPlay.classList.add('rest-mode');
  ringProgress.classList.add('rest-mode');
  btnPlay.textContent = '⏸';
  setRing(1);
  clearInterval(interval);
  interval = setInterval(tick, 1000);
}

function tick() {
  remaining--;
  updateDisplay();
  setRing(remaining / totalDuration);
  if (remaining <= 0) {
    clearInterval(interval);
    running = false;
    phase = 'idle';
    totalRests++;
    statRests.textContent = totalRests;
    beep('end');
    flashScreen();
    showToast('¡A TRABAJAR!');
    phaseBadge.textContent = 'TRABAJO';
    phaseBadge.className = 'phase-badge work';
    timeLabel.textContent = 'DESCANSO';
    btnPlay.classList.remove('rest-mode');
    ringProgress.classList.remove('rest-mode');
    btnPlay.textContent = '▶';
    remaining = restDuration;
    updateDisplay();
    setRing(1);
  }
}

function pauseResume() {
  if (phase === 'idle' && !running) {
    // Start rest
    if (!sessionStart) sessionStart = Date.now();
    startRest();
    return;
  }
  if (running) {
    clearInterval(interval);
    running = false;
    btnPlay.textContent = '▶';
  } else {
    running = true;
    btnPlay.textContent = '⏸';
    interval = setInterval(tick, 1000);
  }
}

function reset() {
  clearInterval(interval);
  running = false;
  phase = 'idle';
  remaining = restDuration;
  totalDuration = restDuration;
  updateDisplay();
  setRing(1);
  phaseBadge.textContent = 'TRABAJO';
  phaseBadge.className = 'phase-badge work';
  timeLabel.textContent = 'DESCANSO';
  btnPlay.classList.remove('rest-mode');
  ringProgress.classList.remove('rest-mode');
  btnPlay.textContent = '▶';
  timeDisplay.classList.remove('warning');
}

function registerSet() {
  if (!sessionStart) sessionStart = Date.now();
  sets++;
  setsDisplay.textContent = sets;
  statSets.textContent = sets;
  updateDots();
  beep('set');
  showToast('¡SERIE COMPLETADA!');
  // Auto-start rest
  startRest();
}

// ─── Duration selection ───────────────────────────────────────────────────────
pills.forEach(p => {
  p.addEventListener('click', () => {
    pills.forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    restDuration = parseInt(p.dataset.val);
    customInput.value = '';
    if (!running) {
      remaining = restDuration;
      totalDuration = restDuration;
      updateDisplay();
      setRing(1);
    }
  });
});

customInput.addEventListener('input', () => {
  const v = parseInt(customInput.value);
  if (v >= 5 && v <= 600) {
    pills.forEach(x => x.classList.remove('active'));
    restDuration = v;
    if (!running) {
      remaining = restDuration;
      totalDuration = restDuration;
      updateDisplay();
      setRing(1);
    }
  }
});

// ─── Manual set counter ───────────────────────────────────────────────────────
setsDown.addEventListener('click', () => {
  if (sets > 0) {
    sets--;
    setsDisplay.textContent = sets;
    statSets.textContent = sets;
    updateDots();
  }
});

setsUp.addEventListener('click', () => {
  sets++;
  setsDisplay.textContent = sets;
  statSets.textContent = sets;
  updateDots();
});

// ─── Button listeners ─────────────────────────────────────────────────────────
btnPlay.addEventListener('click', pauseResume);
btnReset.addEventListener('click', reset);
btnSet.addEventListener('click', registerSet);

// Update session time every minute
setInterval(updateSessionTime, 30000);

// ─── Init ─────────────────────────────────────────────────────────────────────
updateDisplay();
setRing(1);
</script>
</body>
</html>
