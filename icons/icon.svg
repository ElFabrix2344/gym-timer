<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="#0d0d0d"/>

  <!--
    Outer arc — 270°, thick, dominant
    Starts at 6 o'clock, sweeps counter-clockwise through 9, 12, 3
    Gap: bottom-right quadrant (3 → 6)
    r=182, circ≈1143.7 → 270°≈858, gap≈286
  -->
  <circle
    cx="256" cy="256" r="182"
    fill="none"
    stroke="#e2e6ed"
    stroke-width="30"
    stroke-linecap="round"
    stroke-dasharray="858 286"
    transform="rotate(90 256 256)"
  />

  <!--
    Inner arc — 90°, thin, echo
    Occupies the bottom-right gap of the outer arc at smaller radius
    Creates depth — the "second tone" through opacity
    r=128, circ≈804.2 → 90°≈201, gap≈603
  -->
  <circle
    cx="256" cy="256" r="128"
    fill="none"
    stroke="#e2e6ed"
    stroke-width="11"
    stroke-linecap="round"
    stroke-dasharray="201 603"
    opacity="0.38"
  />

</svg>
